<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locket Gold Pro - Hoàng Nghĩa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #F2C94C; --pink-heart: #FF69B4; --snow: #A5A5A5; --bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1D1D1F; overflow: hidden; }
        #overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 1s; }
        .author-img { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .start-btn { background: #000; color: #fff; padding: 20px 60px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }
        .particle { position: fixed; top: -20px; user-select: none; pointer-events: none; z-index: 5; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; opacity: 0; transition: 1.5s; height: 100vh; overflow-y: auto; scrollbar-width: none; }
        .card { background: #F8F8F9; border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid #E5E5E7; }
        header { text-align: center; padding: 20px 0; font-size: 28px; font-weight: 800; }
        header span { color: var(--primary); text-shadow: 1px 1px 0 #000; }
        .btn { display: block; width: 100%; border-radius: 18px; padding: 20px; font-weight: 700; text-align: center; text-decoration: none; margin-top: 10px; }
        .btn-copy { background: #000; color: #fff; }
        .btn-zalo { background: #0068FF; color: white; }
    </style>
</head>
<body>
    <div id="overlay">
        <img src="https://cdn.phototourl.com/free/2026-05-11-b65526e7-8cec-4342-ab5d-598394ed3411.jpg" class="author-img">
        <h1 style="margin-bottom: 10px;">HOÀNG NGHĨA</h1>
        <p style="color: #666; margin-bottom: 30px;">Nhấn nút để trải nghiệm nhạc & hiệu ứng</p>
        <button class="start-btn" onclick="start()">KHÁM PHÁ NGAY</button>
    </div>
    <audio id="bgMusic" loop><source src="Audios_20260326_1216.m4r" type="audio/mp4"></audio>
    <div id="particle-container"></div>
    <div class="container" id="main-content">
        <header>LOCKET <span>GOLD</span> PRO</header>
        <div class="card">
            <h2 style="margin-bottom: 10px; font-size: 18px;">Hướng dẫn Shadowrocket</h2>
            <p style="color: #444; font-size: 14px;">Cách cài đặt Locket Gold mới nhất 2026.</p>
        </div>
        <div class="card">
            <button class="btn btn-copy" onclick="copy()">SAO CHÉP LINK MODULE</button>
            <a href="https://zalo.me/0339283222" target="_blank" class="btn btn-zalo">LIÊN HỆ HOÀNG NGHĨA</a>
        </div>
    </div>
    <script>
        function start() {
            document.getElementById('bgMusic').play().catch(e => {});
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                setInterval(() => {
                    const c = document.getElementById('particle-container');
                    const p = document.createElement('div');
                    const isH = Math.random() > 0.6;
                    p.className = 'particle'; p.innerHTML = isH ? '❤️' : '❄️';
                    p.style.color = isH ? '#FF69B4' : '#A5A5A5';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.fontSize = (Math.random() * 15 + 10) + 'px';
                    p.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    c.appendChild(p); setTimeout(() => p.remove(), 5000);
                }, 200);
            }, 1000);
        }
        function copy() { navigator.clipboard.writeText("https://raw.githubusercontent.com/vuong2023/shad/main/modules/Locket_ohb.sgmodule"); alert("Đã copy!"); }
    </script>
</body>
</html>
